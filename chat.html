<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>程一 · AI助理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .chat-bubble { max-width: 80%; word-break: break-word; }
    .msg-user { align-self: flex-end; }
    .msg-ai { align-self: flex-start; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    /* Markdown styles */
    .msg-ai .md-content h1, .msg-ai .md-content h2, .msg-ai .md-content h3 { font-size: 1em; font-weight: 600; margin: 0.5em 0 0.25em; }
    .msg-ai .md-content p { margin: 0.4em 0; }
    .msg-ai .md-content ul, .msg-ai .md-content ol { margin: 0.4em 0; padding-left: 1.2em; }
    .msg-ai .md-content li { margin: 0.2em 0; }
    .msg-ai .md-content code { background: #f1f5f9; padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
    .msg-ai .md-content pre { background: #1e293b; color: #e2e8f0; padding: 0.75em 1em; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
    .msg-ai .md-content pre code { background: none; padding: 0; color: inherit; }
    .msg-ai .md-content strong { font-weight: 600; }
    .msg-ai .md-content em { font-style: italic; }
    .msg-ai .md-content blockquote { border-left: 3px solid #93c5fd; padding-left: 0.75em; color: #64748b; margin: 0.4em 0; }
    .msg-ai .md-content a { color: #3b82f6; text-decoration: underline; }
    /* Typing dots */
    .typing-dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    /* Fade in */
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="flex flex-col h-screen">

  <!-- Header -->
  <div class="bg-slate-800 text-white px-5 py-3.5 flex items-center gap-3 shrink-0 shadow-md">
    <a href="index.html" class="text-xl hover:opacity-80 transition-opacity" title="返回首页">←</a>
    <div class="flex items-center gap-2">
      <span class="text-lg">🤖</span>
      <div>
        <div class="font-semibold text-sm">超级个体HR · 程一AI助理</div>
        <div class="text-slate-400 text-xs">Powered by OpenClaw</div>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 transition-colors"></span>
      <span id="status-text" class="text-xs text-slate-400">连接中…</span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-3">
    <div class="msg-ai chat-bubble fade-in bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm border border-slate-100 text-sm text-slate-700 leading-relaxed">
      👋 你好！我是程一的AI助理，专注于<strong>超级个体HR</strong>实践。<br><br>
      招聘、绩效、简历、职业发展、AI提效……这些问题都可以问我 😊
    </div>
  </div>

  <!-- Typing indicator (hidden by default) -->
  <div id="typing-indicator" class="hidden px-5 pb-3 shrink-0">
    <div class="flex items-center gap-1.5">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span class="text-xs text-slate-400 ml-1">思考中…</span>
    </div>
  </div>

  <!-- Input -->
  <div class="border-t border-slate-200 bg-white px-4 py-3 shrink-0">
    <div class="flex gap-2.5 max-w-3xl mx-auto">
      <input id="input" type="text"
        class="flex-1 border border-slate-300 rounded-2xl px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400 focus:border-transparent transition-shadow"
        placeholder="输入问题，按 Enter 发送…" 
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){send();return false}" />
      <button onclick="send()" id="send-btn"
        class="bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-white w-11 h-11 rounded-2xl flex items-center justify-center text-lg transition-colors shrink-0">
        ↑
      </button>
    </div>
  </div>

  <script>
    const GATEWAY_URL = 'wss://chengzhanhua.serveousercontent.com';

    let ws = null;
    let connected = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const typingIndicator = document.getElementById('typing-indicator');

    function setStatus(state, text) {
      const colors = { connecting: 'bg-yellow-400', connected: 'bg-green-400', error: 'bg-red-400' };
      statusDot.className = 'w-2 h-2 rounded-full transition-colors ' + (colors[state] || 'bg-gray-400');
      statusText.textContent = text;
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function renderMarkdown(text) {
      // Configure marked
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      }
      // Fallback: escape and convert basic patterns
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    function addMsg(role, html, fadeIn) {
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `msg-${role} chat-bubble ${isUser ? 'bg-slate-800 text-white' : 'bg-white text-slate-700'} ${isUser ? 'rounded-tr-sm' : 'rounded-tl-sm'} p-4 shadow-sm ${isUser ? 'border-none' : 'border border-slate-100'} text-sm leading-relaxed ${fadeIn ? 'fade-in' : ''}`;
      if (isUser) {
        div.textContent = html;
      } else {
        div.innerHTML = `<div class="md-content">${html}</div>`;
      }
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function showTyping() { typingIndicator.classList.remove('hidden'); scrollBottom(); }
    function hideTyping() { typingIndicator.classList.add('hidden'); }

    // Returns true if text looks like internal thinking/reasoning that should be skipped
    function isThinkingText(text) {
      if (!text || typeof text !== 'string') return true;
      const t = text.trim();
      // Short common filler patterns
      if (/^(好的|好的，|嗯|嗯嗯|收到|明白|了解)[。.]?$/.test(t)) return true;
      if (t.length < 8 && /^(好的|嗯|收到)$/.test(t)) return true;
      // English reasoning patterns
      if (/^This is a/.test(t)) return true;
      if (/According to SOUL/i.test(t)) return true;
      if (/^Let me (craft|think|figure|check)/i.test(t)) return true;
      if (/^I should not output/i.test(t)) return true;
      if (/^I should (just |only )?give? the/i.test(t)) return true;
      if (/^I (shouldn't|can't|cannot) (output|show|display)/i.test(t)) return true;
      if (/^My response (should|will|shall)/i.test(t)) return true;
      if (/^The (user|human|person)/i.test(t)) return true;
      if (/^Let me provide? the/i.test(t)) return true;
      if (/^Here's (the |a )?(response|answer|reply)/i.test(t)) return true;
      if (/^Sure[,,]/.test(t)) return true;
      if (/^Of course[,,]/.test(t)) return true;
      if (t.startsWith('[Thinking')) return true;
      return false;
    }

    // Patterns that mark the START of thinking/reasoning content (to discard)
    const THINK_PATTERNS = [
      /^根据 SOUL/i,
      /^Based on SOUL/i,
      /^According to SOUL/i,
      /^This is a (greeting|response|message)/i,
      /^I should (give|provide|output|show)/i,
      /^Let me (give|provide|craft|write|create|check)/i,
      /^My response/i,
      /^The user says/i,
      /^I (shouldn't|cannot|can not)/i,
      /^{{.*}}/,
      /^"[^"]+"$/,
      // Chinese patterns for AI reasoning
      /^根据[\s\S]*?应该/i,
      /^我应该(不)?(输出|给出|显示)/i,
      /^让我(给|提供|写|创建)/i,
      /^[A-Za-z\s]{5,}$/,
    ];

    // Patterns that signal the START of real user-facing content
    // These indicate the thinking phase is over
    const REAL_CONTENT_SIGNALS = [
      /^你好[，,。!！?？]/,
      /^您好[，,。!！?？]/,
      /^[👋😊🎉✨💡]/,
      /^你好！/,
      /^嗯[，,。!！?？]/,
      /^对[，,。!！?]/,
      /^是的[，,。!！?]/,
      /^没错[，,。!！?]/,
      /^[A-Za-z]{1,3}[.。]?\s+[\u4e00-\u9fa5]/,
    ];

    function isLikelyThinking(text) {
      if (!text || text.length < 5) return false;
      // Check if it matches thinking patterns
      for (const pat of THINK_PATTERNS) {
        if (pat.test(text)) return true;
      }
      return false;
    }

    function detectRealContentStart(text) {
      for (const sig of REAL_CONTENT_SIGNALS) {
        if (sig.test(text)) return true;
      }
      // Real content usually has these characteristics:
      // - Starts with a greeting or direct response
      // - Contains emoji
      // - Has short sentences with Chinese punctuation
      if (/^[\u4e00-\u9fa5]{1,3}[，,。!！?？]/.test(text)) return true;
      if (/[😊🎉✨💡👍]/.test(text)) return true;
      return false;
    }

    function stripThinkingContent(text) {
      if (!text) return '';
      let result = text;

      // Strategy 1: If text starts with a clear thinking pattern, find where real content starts
      const lines = result.split('\n');
      const cleanLines = [];
      let reachedReal = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const trimmed = line.trim();

        if (!reachedReal) {
          // Still in thinking phase — check if this line is thinking
          const isThink = isLikelyThinking(trimmed) ||
            (/^[A-Za-z\s"'\[\]{}]+$/.test(trimmed) && trimmed.length > 10) ||
            (/根据.*(SOUL|AGENTS)/.test(trimmed)) ||
            (trimmed.startsWith('I ') && /[A-Z][a-z]+/.test(trimmed) && !/^(I am|I\'m|I have)/.test(trimmed));

          if (!isThink && trimmed.length > 0) {
            // First line that doesn't look like thinking — check if it looks like real content
            if (detectRealContentStart(trimmed) || /[\u4e00-\u9fa5]{4,}/.test(trimmed)) {
              reachedReal = true;
            }
          }
          // Skip this line regardless, don't add to cleanLines yet
          continue;
        }
        cleanLines.push(line);
      }

      if (reachedReal && cleanLines.length > 0) {
        result = cleanLines.join('\n');
      }

      // Strategy 2: Look for the transition from thinking to real content
      // Thinking ends with a Chinese sentence, then a newline, then real content starts
      // Pattern: Chinese sentence ending in 。 or ！ or ？ followed by newline + real content
      if (!reachedReal) {
        const transitionMatch = result.match(/([\u4e00-\u9fa5][。！？][\n\r]+)([\u4e00-\u9fa5])/);
        if (transitionMatch && transitionMatch.index !== undefined) {
          const after = result.substring(transitionMatch.index + transitionMatch[1].length);
          if (detectRealContentStart(after.trim())) {
            result = after;
          }
        }
      }

      return result;
    }

    // Streaming state
    let currentAiDiv = null;
    let currentText = '';
    let hasRealContent = false;

    function startAiBubble() {
      hideTyping();
      showTyping();
      const div = document.createElement('div');
      div.className = 'msg-ai chat-bubble bg-white text-slate-700 rounded-2xl rounded-tl-sm p-4 shadow-sm border border-slate-100 text-sm leading-relaxed fade-in';
      div.innerHTML = '<div class="md-content text-slate-400">思考中…</div>';
      messagesEl.appendChild(div);
      currentAiDiv = div;
      currentText = '';
      hasRealContent = false;
      scrollBottom();
    }

    function appendToAiBubble(delta) {
      if (!currentAiDiv) return;
      currentText += delta;

      // Strip thinking content from accumulated text
      currentText = stripThinkingContent(currentText);

      const clean = currentText.trim();

      // Don't render unless we have substantial real content (avoid showing thinking as content)
      // Require at least 5 meaningful characters
      if (clean.length < 5) return;

      // Check if this looks like real content vs. thinking
      if (isLikelyThinking(clean)) return;

      if (!hasRealContent) {
        hasRealContent = true;
        hideTyping();
      }

      const contentDiv = currentAiDiv.querySelector('.md-content');
      if (contentDiv) contentDiv.innerHTML = renderMarkdown(clean);
      scrollBottom();
    }

    function finalizeAiBubble() {
      hideTyping();
      if (!currentAiDiv) return '';
      const content = stripThinkingContent(currentText).trim();
      const contentDiv = currentAiDiv.querySelector('.md-content');
      if (contentDiv) contentDiv.innerHTML = content ? renderMarkdown(content) : '';
      if (!content) currentAiDiv.remove();
      currentAiDiv = null;
      return content;
    }

    function handleMessage(data) {
      if (typeof data !== 'object' || data === null) return;

      if (data.event === 'connect.challenge') return;

      if ((data.type === 'res' && data.ok && data.payload?.type === 'hello-ok') ||
          (data.event === 'hello-ok')) {
        connected = true;
        setStatus('connected', '在线');
        return;
      }

      if (data.type === 'res' && !data.ok) {
        finalizeAiBubble('');
        addMsg('ai', '出错了：' + (data.error?.message || '未知错误'), true);
        return;
      }

      if (data.type === 'event') {
        const evt = data.event;
        const p = data.payload || {};
        const d = p.data || {};

        if (p.state === 'final' || p.state === 'complete') {
          const content = finalizeAiBubble().trim();
          if (content) addMsg('ai', content, true);
          currentText = '';
          hasRealContent = false;
          return;
        }

        if (p.state === 'delta' || p.state === 'streaming') {
          if (!currentAiDiv) startAiBubble();
          const delta = d.delta || d.text || '';
          if (delta) appendToAiBubble(delta);
          return;
        }

        // Non-streaming events
        let content = '';
        if (evt === 'chat.message') content = p.content || p.text || '';
        else if (evt === 'agent') content = d.content || d.text || '';
        if (!content) return;
        content = stripThinkingContent(content).trim();
        if (!content) return;
        addMsg('ai', content, true);
      }
    }

    function connect() {
      setStatus('connecting', '连接中…');
      ws = new WebSocket(GATEWAY_URL);

      ws.onopen = () => {};

      ws.onmessage = (evt) => {
        let data;
        try { data = JSON.parse(evt.data); } catch { return; }
        handleMessage(data);
      };

      ws.onerror = () => setStatus('error', '连接失败');

      ws.onclose = () => {
        connected = false;
        setStatus('error', '已断开');
        setTimeout(connect, 4000);
      };
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMsg('user', text, true);
      inputEl.value = '';
      sendBtn.classList.add('opacity-60', 'cursor-not-allowed');
      sendBtn.disabled = true;
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        showTyping();
        ws.send(JSON.stringify({ content: text }));
      } else {
        addMsg('ai', '还未连接，请稍候…', true);
        sendBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        sendBtn.disabled = false;
      }
    }

    // Re-enable send button when AI finishes
    const origSend = send;
    const originalCloseHandler = () => {};

    ws = { send: () => {}, close: () => {} };
    // Patch connect to re-enable button on close
    const realConnect = connect;
    connect = function() {
      realConnect();
    };

    // Patch send to re-enable after message received
    const origHandle = handleMessage;
    handleMessage = function(data) {
      origHandle(data);
      // Re-enable send button on final
      if (data.type === 'res' || (data.type === 'event' && (data.payload?.state === 'final' || data.payload?.state === 'complete'))) {
        sendBtn.classList.remove('opacity-60', 'cursor-not-allowed');
        sendBtn.disabled = false;
        hideTyping();
      }
    };

    connect();
  </script>
</body>
</html>
