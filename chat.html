<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>程一 · AI助理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .chat-bubble { max-width: 80%; word-break: break-word; }
    .msg-user { align-self: flex-end; }
    .msg-ai { align-self: flex-start; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    .msg-ai .md-content h1, .msg-ai .md-content h2, .msg-ai .md-content h3 { font-size: 1em; font-weight: 600; margin: 0.5em 0 0.25em; }
    .msg-ai .md-content p { margin: 0.4em 0; }
    .msg-ai .md-content ul, .msg-ai .md-content ol { margin: 0.4em 0; padding-left: 1.2em; }
    .msg-ai .md-content li { margin: 0.2em 0; }
    .msg-ai .md-content code { background: #f1f5f9; padding: 0.1em 0.4em; border-radius: 4px; font-size: 0.9em; font-family: monospace; }
    .msg-ai .md-content pre { background: #1e293b; color: #e2e8f0; padding: 0.75em 1em; border-radius: 8px; overflow-x: auto; margin: 0.5em 0; }
    .msg-ai .md-content pre code { background: none; padding: 0; color: inherit; }
    .msg-ai .md-content strong { font-weight: 600; }
    .msg-ai .md-content em { font-style: italic; }
    .msg-ai .md-content blockquote { border-left: 3px solid #93c5fd; padding-left: 0.75em; color: #64748b; margin: 0.4em 0; }
    .msg-ai .md-content a { color: #3b82f6; text-decoration: underline; }
    .typing-dot { width: 6px; height: 6px; background: #94a3b8; border-radius: 50%; animation: typingBounce 1.4s infinite ease-in-out; }
    .typing-dot:nth-child(1) { animation-delay: 0s; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    /* Input area */
    #chat-input {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 1rem;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      outline: none;
      resize: none;
      overflow: hidden;
      height: 44px;
      line-height: 1.5;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    #chat-input:focus {
      border-color: #94a3b8;
      box-shadow: 0 0 0 3px rgba(148,163,184,0.2);
    }
    #chat-input::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="flex flex-col h-screen">

  <!-- Header -->
  <div class="bg-slate-800 text-white px-5 py-3.5 flex items-center gap-3 shrink-0 shadow-md">
    <a href="index.html" class="text-xl hover:opacity-80 transition-opacity" title="返回首页">←</a>
    <div class="flex items-center gap-2">
      <span class="text-lg">🤖</span>
      <div>
        <div class="font-semibold text-sm">超级个体HR · 程一AI助理</div>
        <div class="text-slate-400 text-xs">Powered by OpenClaw</div>
      </div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400 transition-colors"></span>
      <span id="status-text" class="text-xs text-slate-400">连接中…</span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-3">
    <div class="msg-ai chat-bubble fade-in bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm border border-slate-100 text-sm text-slate-700 leading-relaxed">
      👋 你好！我是程一的AI助理，专注于<strong>超级个体HR</strong>实践。<br><br>
      招聘、绩效、简历、职业发展、AI提效……这些问题都可以问我 😊
    </div>
  </div>

  <!-- Typing indicator -->
  <div id="typing-indicator" class="hidden px-5 pb-3 shrink-0">
    <div class="flex items-center gap-1.5">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <span class="text-xs text-slate-400 ml-1">思考中…</span>
    </div>
  </div>

  <!-- Input -->
  <div class="border-t border-slate-200 bg-white px-4 py-3 shrink-0">
    <div class="flex gap-2.5 max-w-3xl mx-auto items-end">
      <textarea id="chat-input" rows="1"
        placeholder="输入问题，按 Enter 发送…" maxlength="5000"
        oninput="autoResize(this)"
        onkeydown="handleKeydown(event, this)"></textarea>
      <button onclick="sendNow()" id="send-btn"
        class="bg-slate-800 hover:bg-slate-700 active:bg-slate-900 text-white w-11 h-11 rounded-2xl flex items-center justify-center text-lg transition-colors shrink-0">
        ↑
      </button>
    </div>
  </div>

  <script>
    const GATEWAY_URL = 'wss://memphis-whole-nothing-width.trycloudflare.com';

    let ws = null;
    let connected = false;
    let isSending = false;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('chat-input');
    const sendBtn = document.getElementById('send-btn');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');
    const typingIndicator = document.getElementById('typing-indicator');

    // Auto-resize textarea height up to ~5 lines
    function autoResize(el) {
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
      el.style.overflowY = el.scrollHeight > 120 ? 'auto' : 'hidden';
    }

    // Enter = send (no shift-enter for newline in single-line mode)
    function handleKeydown(e, el) {
      if (e.key !== 'Enter' || e.shiftKey) return;
      e.preventDefault();
      e.stopPropagation();
      sendNow();
    }

    // ---- Thinking filter ----
    const THINK_PATTERNS_BLOCKLIST = [
      /^根据 SOUL/i, /^Based on SOUL/i, /^According to SOUL/i,
      /^This is a (greeting|response|message)/i,
      /^I should (give|provide|output|show)/i,
      /^Let me (give|provide|craft|write|create|check)/i,
      /^My response/i, /^The user says/i,
      /^I (shouldn't|cannot|can not)/i,
      /^{{.*}}/,
      /^"[^"]+"$/,
      /^根据[\s\S]*?应该/i,
      /^我应该(不)?(输出|给出|显示)/i,
      /^让我(给|提供|写|创建)/i,
      /^[A-Za-z\s]{5,}$/,
    ];

    const REAL_CONTENT_SIGNALS = [
      /^你好[，,。!！?？]/, /^您好[，,。!！?？]/,
      /^[👋😊🎉✨💡]/, /^嗯[，,。!！?？]/,
      /^对[，,。!！?]/, /^是的[，,。!！?]/,
      /^[A-Za-z]{1,3}[.。]?\s+[\u4e00-\u9fa5]/,
    ];

    function isThinkingText(text) {
      if (!text || text.length < 5) return false;
      for (const p of THINK_PATTERNS_BLOCKLIST) {
        if (p.test(text.trim())) return true;
      }
      return false;
    }

    function looksLikeRealContent(text) {
      const t = text.trim();
      for (const s of REAL_CONTENT_SIGNALS) { if (s.test(t)) return true; }
      if (/^[\u4e00-\u9fa5]{1,3}[，,。!！?？]/.test(t)) return true;
      if (/[😊🎉✨💡👍]/.test(t)) return true;
      return false;
    }

    function filterThinking(raw) {
      if (!raw) return '';
      const lines = raw.split('\n');
      const clean = [];
      let reachedReal = false;
      for (const line of lines) {
        const t = line.trim();
        if (!reachedReal) {
          if (!t) continue;
          // Check if this line is thinking
          const think = isThinkingText(t) ||
            (/^[A-Za-z\s"'\[\]{}]+$/.test(t) && t.length > 10) ||
            (/根据.*(SOUL|AGENTS)/.test(t)) ||
            (t.startsWith('I ') && /[A-Z][a-z]+/.test(t) && !/^(I am|I\'m|I have)/.test(t));
          if (!think && (looksLikeRealContent(t) || /[\u4e00-\u9fa5]{4,}/.test(t))) {
            reachedReal = true;
          } else {
            continue; // skip thinking line
          }
        }
        clean.push(line);
      }
      return clean.join('\n').trim();
    }

    // ---- Markdown ----
    function renderMarkdown(text) {
      if (typeof marked !== 'undefined') {
        marked.setOptions({ breaks: true, gfm: true });
        return marked.parse(text);
      }
      return text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`(.+?)`/g, '<code>$1</code>')
        .replace(/\n/g, '<br>');
    }

    function addMsg(role, text, fadeIn) {
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `msg-${role} chat-bubble ${isUser ? 'bg-slate-800 text-white' : 'bg-white text-slate-700'} ${isUser ? 'rounded-tr-sm' : 'rounded-tl-sm'} p-4 shadow-sm ${isUser ? 'border-none' : 'border border-slate-100'} text-sm leading-relaxed ${fadeIn ? 'fade-in' : ''}`;
      if (isUser) {
        div.textContent = text;
      } else {
        div.innerHTML = `<div class="md-content">${text}</div>`;
      }
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function setStatus(state, text) {
      const colors = { connecting: 'bg-yellow-400', connected: 'bg-green-400', error: 'bg-red-400' };
      statusDot.className = `w-2 h-2 rounded-full transition-colors ${colors[state] || 'bg-gray-400'}`;
      statusText.textContent = text;
    }

    function showTyping() { typingIndicator.classList.remove('hidden'); messagesEl.scrollTop = messagesEl.scrollHeight; }
    function hideTyping() { typingIndicator.classList.add('hidden'); }

    // ---- Streaming ----
    let currentAiDiv = null;
    let currentText = '';
    let hasReal = false;

    function startBubble() {
      hideTyping();
      showTyping();
      const div = document.createElement('div');
      div.className = 'msg-ai chat-bubble bg-white text-slate-700 rounded-2xl rounded-tl-sm p-4 shadow-sm border border-slate-100 text-sm leading-relaxed fade-in';
      div.innerHTML = '<div class="md-content" style="color:#94a3b8">思考中…</div>';
      messagesEl.appendChild(div);
      currentAiDiv = div;
      currentText = '';
      hasReal = false;
    }

    function appendBubble(delta) {
      if (!currentAiDiv) return;
      currentText += delta;
      const cleaned = filterThinking(currentText).trim();
      // Don't show tiny or thinking-only content
      if (cleaned.length < 4) return;
      if (isThinkingText(cleaned)) return;
      if (!hasReal) {
        hasReal = true;
        hideTyping();
      }
      const contentDiv = currentAiDiv.querySelector('.md-content');
      if (contentDiv) contentDiv.innerHTML = renderMarkdown(cleaned);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function finalizeBubble() {
      hideTyping();
      if (!currentAiDiv) return;
      const content = filterThinking(currentText).trim();
      const contentDiv = currentAiDiv.querySelector('.md-content');
      if (contentDiv) contentDiv.innerHTML = content ? renderMarkdown(content) : '';
      if (!content) currentAiDiv.remove();
      currentAiDiv = null;
    }

    function handleMessage(data) {
      if (typeof data !== 'object' || data === null) return;
      if (data.event === 'connect.challenge') return;

      // hello-ok
      if ((data.type === 'res' && data.ok && data.payload?.type === 'hello-ok') || data.event === 'hello-ok') {
        connected = true;
        setStatus('connected', '在线');
        return;
      }

      // Error
      if (data.type === 'res' && !data.ok) {
        finalizeBubble();
        addMsg('ai', '出错了：' + (data.error?.message || '未知错误'), true);
        enableSend();
        return;
      }

      if (data.type !== 'event') return;
      const p = data.payload || {};
      const d = p.data || {};

      if (p.state === 'final' || p.state === 'complete') {
        finalizeBubble();
        const content = filterThinking(currentText).trim();
        if (content) addMsg('ai', content, true);
        currentText = '';
        hasReal = false;
        enableSend();
        return;
      }

      if (p.state === 'delta' || p.state === 'streaming') {
        if (!currentAiDiv) startBubble();
        const delta = d.delta || d.text || '';
        if (delta) appendBubble(delta);
        return;
      }

      // Non-streaming events
      let content = (p.content || p.text || d.content || d.text || '').trim();
      if (!content) return;
      content = filterThinking(content);
      if (!content) return;
      addMsg('ai', content, true);
      enableSend();
    }

    function connect() {
      setStatus('connecting', '连接中…');
      ws = new WebSocket(GATEWAY_URL);
      ws.onopen = () => {};
      ws.onmessage = (e) => {
        try { handleMessage(JSON.parse(e.data)); } catch {}
      };
      ws.onerror = () => setStatus('error', '连接失败');
      ws.onclose = () => {
        connected = false;
        setStatus('error', '已断开');
        enableSend();
        setTimeout(connect, 4000);
      };
    }

    function disableSend() {
      sendBtn.classList.add('opacity-60', 'cursor-not-allowed');
      sendBtn.disabled = true;
      isSending = true;
    }

    function enableSend() {
      sendBtn.classList.remove('opacity-60', 'cursor-not-allowed');
      sendBtn.disabled = false;
      isSending = false;
    }

    function sendNow() {
      if (isSending) return;
      const raw = inputEl.value;
      const text = raw.trim();
      // Clear input FIRST, synchronously
      inputEl.value = '';
      autoResize(inputEl);
      inputEl.blur();
      setTimeout(() => inputEl.focus(), 20);
      if (!text) return;
      disableSend();
      addMsg('user', text, true);
      hideTyping();

      if (ws && ws.readyState === WebSocket.OPEN) {
        showTyping();
        ws.send(JSON.stringify({ content: text }));
      } else {
        addMsg('ai', '还未连接，请稍候…', true);
        enableSend();
      }
    }

    connect();
  </script>
</body>
</html>
