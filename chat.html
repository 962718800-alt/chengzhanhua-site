<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>程一 · AI助理</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #f8fafc; font-family: system-ui, sans-serif; }
    .chat-bubble { max-width: 80%; }
    .msg-user { align-self: flex-end; }
    .msg-ai { align-self: flex-start; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
  </style>
</head>
<body class="flex flex-col h-screen">

  <!-- Header -->
  <div class="bg-brand-600 text-white px-6 py-4 flex items-center gap-3 shrink-0">
    <a href="index.html" class="text-2xl hover:opacity-80" title="返回首页">←</a>
    <div>
      <div class="font-bold">🤖 程一的AI助理</div>
      <div class="text-blue-200 text-xs">Powered by OpenClaw</div>
    </div>
    <div class="ml-auto flex items-center gap-2">
      <span id="status-dot" class="w-2 h-2 rounded-full bg-yellow-400"></span>
      <span id="status-text" class="text-xs text-blue-200">连接中…</span>
    </div>
  </div>

  <!-- Messages -->
  <div id="messages" class="flex-1 overflow-y-auto px-4 py-6 flex flex-col gap-4">
    <div class="msg-ai chat-bubble bg-white rounded-2xl rounded-tl-sm p-4 shadow-sm border border-blue-100 text-sm text-gray-700">
      👋 你好！我是程一的AI助理。<br><br>
      有什么问题想聊？<br>
      <span class="text-xs text-gray-400">首次加载可能需要几秒钟建立连接</span>
    </div>
  </div>

  <!-- Input -->
  <div class="border-t border-gray-200 bg-white px-4 py-4 shrink-0">
    <div class="flex gap-3 max-w-3xl mx-auto">
      <input id="input" type="text"
        class="flex-1 border border-gray-300 rounded-2xl px-5 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
        placeholder="输入你的问题，按 Enter 发送…" 
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){send();return false}" />
      <button onclick="send()"
        class="bg-brand-600 hover:bg-brand-500 text-white w-12 h-12 rounded-2xl flex items-center justify-center text-xl transition shrink-0">
        ↑
      </button>
    </div>
  </div>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50:'#eff6ff',100:'#dbeafe',500:'#1d4ed8',600:'#1e40af',700:'#1e3a8a',900:'#1e293b' }
          }
        }
      }
    };

    const GATEWAY_URL = 'wss://chengzhanhua.serveousercontent.com';

    let ws = null;
    let connected = false;
    let pendingResolve = null;

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    function setStatus(state, text) {
      const colors = { connecting: 'bg-yellow-400', connected: 'bg-green-400', error: 'bg-red-400' };
      statusDot.className = 'w-2 h-2 rounded-full ' + (colors[state] || 'bg-gray-400');
      statusText.textContent = text;
    }

    function scrollBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function addMsg(role, text) {
      const isUser = role === 'user';
      const div = document.createElement('div');
      div.className = `msg-${role} chat-bubble ${isUser ? 'bg-brand-600 text-white' : 'bg-white text-gray-700'} rounded-2xl ${isUser ? 'rounded-tr-sm' : 'rounded-tl-sm'} p-4 shadow-sm ${isUser ? 'border-none' : 'border border-blue-100'} text-sm leading-relaxed`;
      div.textContent = text;
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function addLoading() {
      const div = document.createElement('div');
      div.id = 'loading';
      div.className = 'msg-ai chat-bubble bg-white text-gray-400 rounded-2xl rounded-tl-sm p-4 shadow-sm border border-blue-100 text-sm';
      div.textContent = '思考中…';
      messagesEl.appendChild(div);
      scrollBottom();
    }

    function removeLoading() {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }

    // Returns true if text looks like internal thinking/reasoning that should be skipped
    function isThinkingText(text) {
      if (!text || typeof text !== 'string') return true;
      const t = text.trim();
      if (t.startsWith('The user said')) return true;
      if (t.startsWith('用户发来了')) return true;
      if (t.startsWith('[Thinking')) return true;
      if (t.includes('根据 SOUL.md')) return true;
      if (t.includes('According to SOUL.md')) return true;
      if (t.includes('我在想')) return true;
      if (t.startsWith('I should') || t.startsWith('Let me')) return true;
      return false;
    }

    // Streaming state
    let currentAiDiv = null;
    let currentText = '';
    let thinkingPhase = false;

    function startAiBubble() {
      removeLoading();
      const div = document.createElement('div');
      div.className = 'msg-ai chat-bubble bg-white text-gray-700 rounded-2xl rounded-tl-sm p-4 shadow-sm border border-blue-100 text-sm leading-relaxed';
      div.textContent = '';
      messagesEl.appendChild(div);
      currentAiDiv = div;
      currentText = '';
      thinkingPhase = true;
      scrollBottom();
    }

    function appendToAiBubble(text) {
      if (!currentAiDiv) return;
      currentText += text;
      currentAiDiv.textContent = currentText;
      scrollBottom();
    }

    function finalizeAiBubble() {
      if (!currentAiDiv) return;
      const final = currentText.trim();
      if (final) {
        currentAiDiv.textContent = final;
      } else {
        currentAiDiv.remove();
      }
      currentAiDiv = null;
      currentText = '';
      thinkingPhase = false;
    }

    // Strip thinking prefix from accumulated text
    function stripThinkingPrefix(text) {
      const t = text.trim();
      // Match "The user said..." or similar internal narration patterns
      const thinkPatterns = [
        /^The user said [^.。]+[.。]\s*/,
        /^用户发来了[^.。]+[.。]\s*/,
        /^\[Thinking[^\]]*\]\s*/,
        /^根据 SOUL\.md[^.。]*[.。]\s*/,
        /^According to SOUL\.md[^.。]*[.。]\s*/,
        /^我在想[^.。]*[.。]\s*/,
        /^I should [^.。]*[.。]\s*/,
        /^Let me [^.。]*[.。]\s*/,
      ];
      let result = text;
      for (const pat of thinkPatterns) {
        result = result.replace(pat, '');
      }
      return result;
    }

    function handleMessage(data) {
      if (typeof data !== 'object' || data === null) return;

      if (data.event === 'connect.challenge') return;

      if ((data.type === 'res' && data.ok && data.payload?.type === 'hello-ok') ||
          (data.event === 'hello-ok')) {
        connected = true;
        setStatus('connected', '在线');
        return;
      }

      if (data.type === 'res' && !data.ok) {
        removeLoading();
        finalizeAiBubble();
        addMsg('ai', '出错了：' + (data.error?.message || '未知错误'));
        return;
      }

      if (data.type === 'event') {
        const evt = data.event;
        const p = data.payload || {};
        const d = p.data || {};

        // Final message event — show complete response
        if (p.state === 'final' || p.state === 'complete') {
          finalizeAiBubble();
          let content = '';
          if (d.content) {
            if (typeof d.content === 'string') content = d.content;
            else if (Array.isArray(d.content)) {
              content = d.content.filter(c => c.type === 'text').map(c => c.text).join('');
            }
          } else if (d.text) {
            content = d.text;
          }
          content = stripThinkingPrefix(content).trim();
          if (content) addMsg('ai', content);
          return;
        }

        // Streaming delta — accumulate text
        if (p.state === 'delta' || p.state === 'streaming') {
          if (!currentAiDiv) startAiBubble();

          const delta = d.delta || d.text || '';

          // replace=true signals the thinking/prefix phase is done — clean and restart
          if (d.replace === true) {
            // If we accumulated thinking content, strip it and restart fresh
            if (thinkingPhase && currentText) {
              const clean = stripThinkingPrefix(currentText).trim();
              currentText = clean ? clean + delta : delta;
              thinkingPhase = false;
            } else {
              currentText = delta;
            }
            if (currentAiDiv) {
              currentAiDiv.textContent = currentText;
              scrollBottom();
            }
          } else {
            // Normal incremental append
            currentText += delta;
            if (currentAiDiv) {
              currentAiDiv.textContent = currentText;
              scrollBottom();
            }
          }
          return;
        }

        // Non-streaming agent/chat events
        let content = '';
        if (evt === 'chat.message') {
          content = p.content || p.text || '';
        } else if (evt === 'agent') {
          content = d.content || d.text || '';
        }
        if (!content) return;
        content = stripThinkingPrefix(content).trim();
        if (!content) return;
        addMsg('ai', content);
      }
    }

    function connect() {
      setStatus('connecting', '连接中…');
      ws = new WebSocket(GATEWAY_URL);

      ws.onopen = () => {};

      ws.onmessage = (evt) => {
        let data;
        try { data = JSON.parse(evt.data); } catch { return; }
        handleMessage(data);
      };

      ws.onerror = () => setStatus('error', '连接失败');

      ws.onclose = () => {
        connected = false;
        setStatus('error', '已断开');
        setTimeout(connect, 3000);
      };
    }

    function send() {
      const text = inputEl.value.trim();
      if (!text) return;
      addMsg('user', text);
      inputEl.value = '';
      
      if (ws && ws.readyState === WebSocket.OPEN) {
        addLoading();
        ws.send(JSON.stringify({ content: text }));
      } else {
        addMsg('ai', '还未连接，请稍候…');
      }
    }

    connect();
  </script>
</body>
</html>
